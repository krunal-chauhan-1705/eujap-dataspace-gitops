global:
  imageRegistry: "public.ecr.aws/smartsensesolutions"
  imagePullSecrets: []

# -- Ingress class name (nginx)
ingressClassName: nginx

# -- TLS configuration via cert-manager
tls:
  enabled: true
  clusterIssuer: letsencrypt-prod

backend:
  replicaCount: 1
  image:
    repository: eu-jap-hack/backend
    tag: "1.0.41"
    pullPolicy: Always
  service:
    port: 8000
  ingress:
    host: "jeh-api.dataspace.smartsenselabs.com"
  env:
    DATABASE_URL: "postgresql://<path:k8s-stack/data/eujap/backend#dbuser>:<path:k8s-stack/data/eu-jap-hack/backend#dbpass>@<path:k8s-stack/data/eujap/backend#dbhost>:5432/<path:k8s-stack/data/eujap/backend#dbname>"
    ENABLE_EDC: "true"
    AUTH_ENABLED: "false"
    KEYCLOAK_URL: "https://auth.dataspace.smartsenselabs.com"
    KEYCLOAK_REALM: "eu-jap-hack"
    KEYCLOAK_ADMIN_CLIENT_ID: "realm_admin_client"
    KEYCLOAK_ADMIN_CLIENT_SECRET: "<path:k8s-stack/data/eujap/backend#admin-client-secret>"
    ENABLE_EDC_PROVISIONING: "true"
    MAX_COMPANIES: "20"
    GAIAX_DID_DOMAIN: "jeh-api.dataspace.smartsenselabs.com"
    GAIAX_DID_PATH: "v15"
    EDC_BASE_URL: "https://toyota-controlplane.dataspace.smartsenselabs.com"
    EDC_API_KEY: "tata-motors"
    BPN_NUMBER: "BPNL00000000024R"
    APP_BASE_URL: "https://jeh-api.dataspace.smartsenselabs.com"
    EDC_ACCESS_POLICY_ID: "policy_2"
    EDC_CONTRACT_POLICY_ID: "policy_2"
    EDC_CONSUMER_MANAGEMENT_URL: "https://nissan-motors-controlplane.dataspace.smartsenselabs.com/management"
    EDC_CONSUMER_API_KEY: "nissan-motors"
    EDC_NEGOTIATION_INITIAL_DELAY_MS: "5000"
    EDC_NEGOTIATION_POLL_INTERVAL_MS: "5000"
    EDC_NEGOTIATION_MAX_RETRIES: "3"
    CADDE_ASSET_ID: "asset_7"
    CADDE_PARTNER_EDC_DSP_URL: "https://toyota-protocol.dataspace.smartsenselabs.com/api/v1/dsp"
    CADDE_PARTNER_EDC_BPN: "BPNL00000000024R"
    PROVISIONING_SERVICE_URL: "http://eu-jap-hack-provisioning:3001"
    WALTID_ISSUER_URL: "http://eu-jap-hack-waltid-issuer:7002"
    WALTID_WALLET_URL: "http://eu-jap-hack-waltid-wallet:7001"
    WALTID_VERIFIER_URL: "http://eu-jap-hack-waltid-verifier:7003"
  resources:
    requests:
      cpu: 10m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

keycloak:
  enabled: true
  replicaCount: 1
  image:
    repository: eu-jap-hack/keycloak
    tag: "1.0.41"
    pullPolicy: Always
  adminUsername: admin
  adminPassword: "<path:k8s-stack/data/eujap/keycloak#adminpass>"
  db:
    url: "jdbc:postgresql://postgres.postgres:5432/auth"
    username: "<path:k8s-stack/data/eujap/keycloak#dbuser>"
    password: "<path:k8s-stack/data/eujap/keycloak#dbpass>"
  service:
    port: 8080
  ingress:
    host: "auth.dataspace.smartsenselabs.com"
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

