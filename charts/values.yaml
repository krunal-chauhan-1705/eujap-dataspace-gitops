  env:
    VITE_KEYCLOAK_URL: "https://auth.dataspace.smartsenselabs.com"
    VITE_KEYCLOAK_REALM: "eu-jap-hack"
    VITE_API_BASE_URL: "https://jeh-api.dataspace.smartsenselabs.com/api"
    VITE_PORTAL_COMPANY_URL: "https://jeh-company.dataspace.smartsenselabs.com"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

