{{- if and .Values.keycloak.enabled .Values.keycloak.ingress.host }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "eujap.fullname" . }}-keycloak
  labels:
    {{- include "eujap.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    {{- if .Values.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.tls.clusterIssuer | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingressClassName }}
  {{- if .Values.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.keycloak.ingress.host }}
      secretName: {{ include "eujap.fullname" . }}-keycloak-tls
  {{- end }}
  rules:
    - host: {{ .Values.keycloak.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "eujap.fullname" . }}-keycloak
                port:
                  number: {{ .Values.keycloak.service.port }}
{{- end }}