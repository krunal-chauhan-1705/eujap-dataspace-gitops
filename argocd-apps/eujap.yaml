apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
 name: eujap
 namespace: argocd
spec:
 project: default
 source:
   repoURL: https://github.com/krunal-chauhan-1705/eujap-dataspace-gitops.git
   targetRevision: main
   path: charts/
   plugin:
    name: argocd-vault-plugin-helm
    env:
      - name: VAULT_SECRET
        value: vault-secret
      - name: HELM_VALUES_FILE
        value: values.yaml
 destination:
   server: https://kubernetes.default.svc
   namespace: default
 syncPolicy:
   automated:
     prune: true
     selfHeal: true
   syncOptions:
   - CreateNamespace=true
